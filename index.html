<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SPS Stroke Care — LINE OA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@500;600;700&display=swap');

:root {
--green:#06C755; --green-dk:#04A044; --green-lt:#E8FAF0;
--teal:#0D7C6E; --teal-lt:#E2F5F3; --teal-pale:#F0FAF9;
--amber:#E8870A; --amber-lt:#FFF4E0;
--red:#D63031; --red-lt:#FDE8E8;
--green2:#27AE60; --green2-lt:#E9F8EF;
--purple:#8B5CF6; --purple-lt:#F3EFFF;
--ink:#1C2B2A; --ink-s:#3D5250; --muted:#718E8C;
--rule:#D4E8E5; --bg:#F0F0F0; --white:#FFFFFF;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:#C8C8C8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

/* PHONE */
.phone{width:390px;min-height:844px;background:var(--bg);border-radius:44px;box-shadow:0 20px 60px rgba(0,0,0,0.35),0 0 0 2px #888,inset 0 0 0 3px #1a1a1a;overflow:hidden;display:flex;flex-direction:column;position:relative;}

/* STATUS */
.status{background:var(--green-dk);color:white;font-size:12px;font-family:'Kanit',sans-serif;display:flex;justify-content:space-between;align-items:center;padding:10px 20px 6px;flex-shrink:0;}

/* HEADER */
.hdr{background:var(--green-dk);color:white;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.hdr-av{width:40px;height:40px;border-radius:12px;background:white;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.hdr-info{flex:1;}
.hdr-name{font-family:'Kanit',sans-serif;font-size:16px;font-weight:600;}
.hdr-sub{font-size:11px;opacity:.85;margin-top:1px;}
.hdr-act{display:flex;gap:14px;font-size:20px;opacity:.9;}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

.date-div{text-align:center;font-size:11px;color:var(--muted);background:rgba(0,0,0,0.06);border-radius:10px;padding:3px 10px;align-self:center;}

.row{display:flex;align-items:flex-end;gap:6px;}
.row.bot{align-self:flex-start;}
.row.usr{align-self:flex-end;flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

.bub{max-width:265px;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.bub.bot{background:white;border-bottom-left-radius:4px;color:var(--ink);}
.bub.usr{background:var(--green);border-bottom-right-radius:4px;color:white;}
.bub .t{font-size:10px;opacity:.55;margin-top:4px;text-align:right;}

/* CARD */
.card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);max-width:270px;}
.card-hd{padding:13px 15px 9px;font-family:'Kanit',sans-serif;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.card-bd{padding:0 15px 13px;font-size:13px;line-height:1.6;color:var(--ink-s);}
.card-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--rule);font-size:13px;color:var(--ink-s);}
.card-item:last-child{border-bottom:none;}
.ci{font-size:18px;flex-shrink:0;margin-top:1px;}
.card-act{border-top:1px solid var(--rule);display:flex;}
.cbtn{flex:1;padding:11px 8px;background:none;border:none;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;color:var(--teal);cursor:pointer;}
.cbtn:hover{background:var(--teal-lt);}
.cbtn+.cbtn{border-left:1px solid var(--rule);}

/* FLEX MENU */
.fmenu{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);max-width:270px;}
.fmenu-hd{padding:11px 14px 7px;font-family:'Kanit',sans-serif;font-size:14px;font-weight:600;color:var(--ink);}
.fgrid{display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 14px;}
.fbtn{padding:7px 12px;border-radius:20px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;border:2px solid;cursor:pointer;background:none;transition:all .15s;}
.fbtn.g{border-color:var(--green);color:var(--green-dk);}
.fbtn.g:hover,.fbtn.g.on{background:var(--green);color:white;}
.fbtn.t{border-color:var(--teal);color:var(--teal);}
.fbtn.t:hover,.fbtn.t.on{background:var(--teal);color:white;}
.fbtn.a{border-color:var(--amber);color:#7a4500;}
.fbtn.a:hover,.fbtn.a.on{background:var(--amber);color:white;}
.fbtn.r{border-color:var(--red);color:var(--red);}
.fbtn.r:hover,.fbtn.r.on{background:var(--red);color:white;}
.fbtn.p{border-color:var(--purple);color:var(--purple);}
.fbtn.p:hover,.fbtn.p.on{background:var(--purple);color:white;}

/* ALERT */
.alert{border-radius:14px;padding:12px 14px;max-width:270px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.alert.red{background:var(--red);color:white;}
.alert.amber{background:var(--amber-lt);border:1.5px solid #F5C87A;color:var(--ink);}
.alert.teal{background:var(--teal-lt);border:1.5px solid #A0D8D3;color:var(--ink);}
.alert-title{font-family:'Kanit',sans-serif;font-size:15px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.alert ul{padding-left:16px;line-height:1.7;}
.acall{margin-top:10px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:8px;padding:9px 14px;text-align:center;font-family:'Kanit',sans-serif;font-size:15px;font-weight:700;}

/* STEP */
.step-list{display:flex;flex-direction:column;gap:8px;max-width:270px;}
.step{background:white;border-radius:12px;padding:11px 13px;box-shadow:0 2px 8px rgba(0,0,0,0.07);border:1px solid var(--rule);display:flex;gap:10px;align-items:flex-start;}
.snum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;}
.stxt{font-size:13px;color:var(--ink-s);line-height:1.55;}
.stxt strong{color:var(--ink);}

/* TYPING */
.typing-bub{background:white;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.dots{display:flex;align-items:center;gap:4px;padding:10px 14px;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite both;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.85);}40%{opacity:1;transform:scale(1);}}

/* INPUT */
.input-bar{background:#F7F8F9;border-top:1px solid var(--rule);padding:8px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.iplus{font-size:22px;color:var(--muted);cursor:pointer;}
.ifield{flex:1;background:white;border:1px solid var(--rule);border-radius:22px;padding:8px 14px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;color:var(--ink);}
.ifield::placeholder{color:var(--muted);}
.isend{width:36px;height:36px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform .1s;}
.isend:hover{transform:scale(1.08);}

/* RICH MENU */
.rmenu{background:#1F1F1F;display:grid;grid-template-columns:1fr 1fr 1fr;flex-shrink:0;}
.rmbtn{padding:11px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;font-family:'Sarabun',sans-serif;font-size:10px;font-weight:600;color:#E0E0E0;transition:background .15s;border-right:1px solid #333;border-bottom:1px solid #333;}
.rmbtn:nth-child(3),.rmbtn:nth-child(6){border-right:none;}
.rmbtn:nth-child(4),.rmbtn:nth-child(5),.rmbtn:nth-child(6){border-bottom:none;}
.rmbtn:hover{background:rgba(255,255,255,0.07);}
.rmicon{font-size:22px;}

/* SCENARIO PANEL */
.spanel{position:absolute;left:-230px;top:0;width:215px;height:100%;background:white;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);padding:14px;overflow-y:auto;}
.sp-title{font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;color:var(--teal);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--teal-lt);}
.sp-btn{display:block;width:100%;text-align:left;padding:7px 10px;margin-bottom:5px;background:var(--bg);border:1px solid var(--rule);border-radius:10px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:500;color:var(--ink-s);transition:all .15s;}
.sp-btn:hover,.sp-btn.on{background:var(--teal);border-color:var(--teal);color:white;}

/* HOME CARE PAGE */
.hcpage{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);max-width:270px;}
.hcpage-hd{padding:13px 15px 10px;color:white;font-family:'Kanit',sans-serif;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.hcitem{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background .12s;}
.hcitem:last-child{border-bottom:none;}
.hcitem:hover{background:var(--teal-pale);}
.hc-icon{font-size:24px;flex-shrink:0;}
.hc-info{flex:1;}
.hc-title{font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;color:var(--ink);}
.hc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.hc-arr{font-size:16px;color:var(--muted);}

@media(max-width:680px){.spanel{display:none;}body{padding:0;}.phone{border-radius:0;width:100%;min-height:100vh;}}
</style>
</head>
<body>

<!-- SCENARIO PANEL -->
<div class="spanel">
<div class="sp-title">🎭 เลือกสถานการณ์</div>
<button class="sp-btn on" onclick="run('welcome')">🏠 หน้าต้อนรับ</button>

</div>

<!-- PHONE -->
<div class="phone">
<div class="status"><span>9:41</span><span style="font-size:11px">SPS Stroke Care</span><span>📶 🔋</span></div>
<div class="hdr">
<span style="font-size:20px;cursor:pointer">‹</span>
<div class="hdr-av">🧠</div>
<div class="hdr-info">
<div class="hdr-name">SPS Stroke Care</div>
<div class="hdr-sub">✅ Official Account · รพ.สรรพสิทธิประสงค์</div>
</div>

</div>

<div class="input-bar">

</div>

<div class="rmenu">

</div>
</div>

<script>
const chat = document.getElementById('chat');
let tyEl = null;

function now(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function scroll(){ chat.scrollTop=chat.scrollHeight; }

function showTyping(){
tyEl=document.createElement('div'); tyEl.className='row bot';
tyEl.innerHTML=`<div class="av">🧠</div><div class="typing-bub"><div class="dots"><span></span><span></span><span></span></div></div>`;
chat.appendChild(tyEl); scroll();
}
function hideTyping(){ if(tyEl){tyEl.remove();tyEl=null;} }

function addBot(html,delay=0){
return new Promise(r=>setTimeout(()=>{
hideTyping();
const row=document.createElement('div'); row.className='row bot';
row.innerHTML=`<div class="av">🧠</div><div>${html}</div>`;
chat.appendChild(row); scroll(); showTyping(); r();
},delay));
}

function addUser(txt){
hideTyping();
const row=document.createElement('div'); row.className='row usr';
row.innerHTML=`<div class="bub usr">${txt}<div class="t">${now()} ✓✓</div></div>`;
chat.appendChild(row); scroll();
}

function bub(txt){ return `<div class="bub bot">${txt}<div class="t">${now()}</div></div>`; }

function card(color,icon,title,items=[]){
const it=items.map(i=>`<div class="card-item"><span class="ci">${i.ic}</span><span>${i.tx}</span></div>`).join('');
return `<div class="card"><div class="card-hd" style="background:${color};color:white"><span style="font-size:20px">${icon}</span>${title}</div><div class="card-bd">${it}</div></div>`;
}

function fmenu(title,btns){
const bg=btns.map(b=>`<button class="fbtn ${b.c}" onclick="run('${b.k}')">${b.ic} ${b.lb}</button>`).join('');
return `<div class="fmenu"><div class="fmenu-hd">${title}</div><div class="fgrid">${bg}</div></div>`;
}

function alertRed(title,items,call=''){
const it=items.map(i=>`<li>${i}</li>`).join('');
const c=call?`<div class="acall">📞 ${call}</div>`:'';
return `<div class="alert red"><div class="alert-title">🚨 ${title}</div><ul>${it}</ul>${c}</div>`;
}

function steps(items,color='#0D7C6E'){
const st=items.map((it,i)=>`<div class="step"><div class="snum" style="background:${color}20;color:${color}">${i+1}</div><div class="stxt">${it}</div></div>`).join('');
return `<div class="step-list">${st}</div>`;
}

function homeCarePage(){
const items=[
{icon:'🫁',title:'ประเมินการกลืน',sub:'Modified Water Swallowing Test',key:'swallow'},
{icon:'🍼',title:'อาหารทางสายยาง',sub:'วิธีให้ NG tube ที่บ้าน',key:'ngtube'},
{icon:'🩹',title:'ป้องกัน & ทำแผลกดทับ',sub:'Stage 1-4 พร้อมวิธีดูแล',key:'wound'},
{icon:'💨',title:'ดูดเสมหะทางปาก',sub:'วิธีง่ายๆ สำหรับผู้ดูแล',key:'suction'},
{icon:'🔄',title:'พลิกตะแคงตัว',sub:'ทุก 2 ชม. ป้องกันแผลกดทับ',key:'turn'},
];
const rows=items.map(i=>`
<div class="hcitem" onclick="run('${i.key}')">
<span class="hc-icon">${i.icon}</span>
<div class="hc-info">
<div class="hc-title">${i.title}</div>
<div class="hc-sub">${i.sub}</div>
</div>
<span class="hc-arr">›</span>
</div>`).join('');
return `<div class="hcpage">
<div class="hcpage-hd" style="background:#0D7C6E">🏠 การดูแลที่บ้าน</div>
${rows}
</div>`;
}

// ══ SCENARIOS ══

async function scWelcome(){
await addBot(bub('สวัสดีค่ะ 🙏<br>ยินดีต้อนรับสู่ <strong>SPS Stroke Care</strong><br>บัญชีทางการ Stroke Unit<br>รพ.สรรพสิทธิประสงค์ <br><br>บัญชีนี้ให้ความรู้เท่านั้น ไม่มีเจ้าหน้าที่ตอบกลับข้อความ เร่งด่วน ฉุกเฉิน โทร 1669'),1000);
await addBot(card('#0D7C6E','🧠','บริการของเรา',[
{ic:'📋',tx:'D-METHOD การดูแลตัวเองที่บ้าน'},
{ic:'🚨',tx:'อาการผิดปกติที่ต้องรีบมา รพ.'},
{ic:'💊',tx:'ยาและโภชนาการที่เหมาะสม'},
{ic:'🏠',tx:'การดูแลที่บ้านสำหรับผู้ดูแล'},
{ic:'💪',tx:'การฟื้นฟูและออกกำลังกาย'},
]),2500);
await addBot(fmenu('🏠 เริ่มต้นที่ไหนดีค่ะ?',[
{ic:'📋',lb:'D-METHOD',c:'t',k:'dmethod'},
{ic:'🚨',lb:'อาการฉุกเฉิน',c:'r',k:'warning'},
{ic:'🏠',lb:'ดูแลที่บ้าน',c:'t',k:'homecare'},
{ic:'💊',lb:'ยา & อาหาร',c:'a',k:'food'},
{ic:'💪',lb:'ฟื้นฟู',c:'g',k:'rehab'},
{ic:'❓',lb:'ถาม-ตอบ',c:'p',k:'faq'},
]),4000);
}

async function scDmethod(){
await addBot(bub('📋 <strong>D-METHOD</strong><br>แนวทางดูแลตัวเองที่บ้านครบทุกด้านค่ะ'),1000);
const steps2=[
{l:'D',c:'#D63031',ic:'🧠',title:'Diagnosis',tx:'รู้จักโรคของตัวเอง<br>• ชนิดโรค (ขาดเลือด/เลือดออก) และสาเหตุ<br>• ปัจจัยเสี่ยงที่ต้องควบคุม (ความดัน เบาหวาน ไขมัน)'},
{l:'M',c:'#E8870A',ic:'💊',title:'Medication',tx:'กินยาตรงเวลาทุกวัน ห้ามหยุดยาเอง<br>• Aspirin/Clopidogrel ต้านเกล็ดเลือด<br>• ยาลดความดัน ยาลดไขมัน'},
{l:'E',c:'#0D7C6E',ic:'🏠',title:'Environment',tx:'จัดบ้านให้ปลอดภัย<br>• ราวจับในห้องน้ำ พื้นไม่ลื่น<br>• แสงสว่างเพียงพอ ทางเดินโล่ง ป้องกันการล้ม'},
{l:'T',c:'#8B5CF6',ic:'🏃',title:'Treatment',tx:'รักษาต่อเนื่องและฟื้นฟู<br>• ออกกำลังกาย/กายภาพบำบัด 30 นาที/วัน<br>• ทำตามแผนฟื้นฟูที่แพทย์กำหนด'},

{ic:'😵',tx:'เวียนศีรษะ หน้ามืด หายใจไม่ออก'},
{ic:'🤕',tx:'ปวดหน้าอก ปวดข้อรุนแรง'},
]),3500);
await addBot(bub('📅 นัดกายภาพบำบัดตามแพทย์กำหนด<br>สอบถามได้ที่แผนกเวชศาสตร์ฟื้นฟูค่ะ'),5000);
}

async function scFaq(){
await addBot(bub('❓ <strong>คำถามที่พบบ่อย</strong><br>จากผู้ป่วยและครอบครัวค่ะ'),1000);
const faqs=[
{q:'โอกาสเป็น Stroke ซ้ำมีมากไหม?',a:'ใน 10 ปีแรก มีโอกาส 25-30% แต่ถ้าควบคุม BP น้ำตาล ไขมัน งดบุหรี่ จะลดได้มากค่ะ'},
{q:'ผู้ป่วยขับรถได้เมื่อไหร่?',a:'ต้องรอแพทย์อนุญาต โดยทั่วไปอย่างน้อย 3-6 เดือน ขึ้นอยู่กับความรุนแรงค่ะ'},
{q:'นอนมากเกินไป ปกติไหม?',a:'ปกติในระยะแรกค่ะ สมองต้องพักฟื้น แต่ถ้าเรียกไม่ตื่น ต้องรีบมา รพ. ทันที'},
{q:'เป็นซ้ำรู้ได้อย่างไร?',a:'สังเกตด้วย BE-FAST ค่ะ ถ้ามีอาการโทร 1669 ทันที ไม่รอดูอาการ'},
];
for(let i=0;i<faqs.length;i++){

await addBot(bub('เร่งด่วน ฉุกเฉิน โทร 1669.ค่ะ<br><strong>ทีมพยาบาล Stroke Unit รพ.สรรพสิทธิประสงค์</strong> 🧠💚'),1400*(faqs.length+1));
}

// ── RUN ──
async function run(key){
document.querySelectorAll('.sp-btn').forEach(b=>b.classList.remove('on'));
const b=document.querySelector(`.sp-btn[onclick="run('${key}')"]`);
if(b)b.classList.add('on');
chat.innerHTML='<div class="date-div">วันนี้</div>';
showTyping();
const map={welcome:scWelcome,dmethod:scDmethod,warning:scWarning,food:scFood,homecare:scHomecare,swallow:scSwallow,ngtube:scNgtube,wound:scWound,suction:scSuction,turn:scTurn,rehab:scRehab,faq:scFaq};
if(map[key])await map[key]();
}

function sendUser(){
const inp=document.getElementById('inp');
const txt=inp.value.trim(); if(!txt)return;
inp.value=''; addUser(txt); showTyping();
const l=txt.toLowerCase();
let k='faq';
if(l.includes('กลืน')||l.includes('สำลัก'))k='swallow';
else if(l.includes('สายยาง')||l.includes('ng'))k='ngtube';
else if(l.includes('แผล')||l.includes('กดทับ'))k='wound';
else if(l.includes('เสมหะ')||l.includes('ดูด'))k='suction';
else if(l.includes('พลิก')||l.includes('ตะแคง'))k='turn';
else if(l.includes('dmethod')||l.includes('d-method')||l.includes('ดูแลตัว'))k='dmethod';
else if(l.includes('ฉุกเฉิน')||l.includes('fast')||l.includes('อาการ'))k='warning';
else if(l.includes('อาหาร')||l.includes('ยา')||l.includes('กิน'))k='food';
else if(l.includes('ออกกำลัง')||l.includes('ฟื้นฟู'))k='rehab';
else if(l.includes('ดูแล')||l.includes('บ้าน'))k='homecare';
setTimeout(()=>run(k),1000);
}

window.addEventListener('load',()=>run('welcome'));
</script>
